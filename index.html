<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ── Primary SEO ─────────────────────────────────────────────────────── -->
    <title>Nexylon Technologies | Enterprise AI, Cloud &amp; Digital Transformation</title>
    <meta name="description" content="Nexylon Technologies delivers AI-powered enterprise solutions, cloud transformation, and digital innovation services to global organizations across 150+ countries." />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <meta name="theme-color" content="#0A1628" />
    <meta name="author" content="Nexylon Technologies" />

    <!-- ── Favicon & Touch Icons ───────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Preconnect for Google Fonts (non-blocking) ──────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Google Fonts with font-display:swap for render performance ────── -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- ── Open Graph defaults (overridden per-page by React 19 metadata) ── -->
    <meta property="og:type"         content="website" />
    <meta property="og:locale"       content="en_US" />
    <meta property="og:site_name"    content="Nexylon Technologies" />
    <meta property="og:title"        content="Nexylon Technologies | Enterprise AI, Cloud &amp; Digital Transformation" />
    <meta property="og:description"  content="Nexylon Technologies delivers AI-powered enterprise solutions, cloud transformation, and digital innovation services to global organizations across 150+ countries." />
    <meta property="og:url"          content="https://www.nexylontechnologies.com/" />
    <meta property="og:image"        content="https://www.nexylontechnologies.com/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type"   content="image/jpeg" />
    <meta property="og:image:alt"    content="Nexylon Technologies – Enterprise AI, Cloud &amp; Digital Transformation" />

    <!-- ── Twitter / X defaults ───────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@nexylonsw" />
    <meta name="twitter:creator"     content="@nexylonsw" />
    <meta name="twitter:title"       content="Nexylon Technologies | Enterprise AI &amp; Cloud Solutions" />
    <meta name="twitter:description" content="AI-powered enterprise software, cloud transformation, and digital innovation for global organizations." />
    <meta name="twitter:image"       content="https://www.nexylontechnologies.com/og-image.jpg" />
    <meta name="twitter:image:alt"   content="Nexylon Technologies – Enterprise Technology Leader" />

    <!-- ── Organization Schema (global; page-level schemas injected by React) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://www.nexylontechnologies.com/#organization",
      "name": "Nexylon Technologies",
      "legalName": "Nexylon Technologies, Inc.",
      "url": "https://www.nexylontechnologies.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.nexylontechnologies.com/logo.png",
        "width": 200,
        "height": 60
      },
      "description": "Nexylon Technologies is a multinational enterprise software company delivering AI, cloud, and digital transformation solutions to organizations worldwide.",
      "foundingDate": "1999",
      "numberOfEmployees": { "@type": "QuantitativeValue", "value": 5000 },
      "areaServed": "Worldwide",
      "knowsAbout": [
        "Enterprise Software Development",
        "Artificial Intelligence",
        "Machine Learning",
        "Cloud Architecture",
        "Cybersecurity",
        "Digital Transformation",
        "IT Consulting",
        "Data Analytics"
      ],
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "telephone": "+1-800-Nexylon",
          "contactType": "customer service",
          "availableLanguage": ["English"],
          "contactOption": "TollFree",
          "areaServed": "US"
        },
        {
          "@type": "ContactPoint",
          "email": "enterprise@nexylontechnologies.com",
          "contactType": "sales",
          "availableLanguage": ["English"]
        }
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "350 Market Street, Suite 2400",
        "addressLocality": "San Francisco",
        "addressRegion": "CA",
        "postalCode": "94105",
        "addressCountry": "US"
      },
      "sameAs": [
        "https://www.linkedin.com/company/Nexylon-Technologies",
        "https://twitter.com/nexylonsw",
        "https://www.youtube.com/@nexylontechnologies",
        "https://github.com/Nexylon-Technologies"
      ]
    }
    </script>

    <!-- ── WebSite Schema with SearchAction ───────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://www.nexylontechnologies.com/#website",
      "url": "https://www.nexylontechnologies.com",
      "name": "Nexylon Technologies",
      "description": "Enterprise AI, Cloud &amp; Digital Transformation solutions for global organizations.",
      "publisher": { "@id": "https://www.nexylontechnologies.com/#organization" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.nexylontechnologies.com/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
